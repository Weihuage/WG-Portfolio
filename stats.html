<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Portfolio Analytics</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
    td:last-child, th:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1>📊 Page Views</h1>
  <table id="stats">
    <thead><tr><th>Page</th><th>Views</th></tr></thead>
    <tbody></tbody>
  </table>
  <script>
    fetch("https://gyzau16ub8.execute-api.us-east-1.amazonaws.com/stats")
      .then(r => r.json())
      .then(rows => {
        const tbody = document.querySelector("#stats tbody");
        tbody.innerHTML = rows
          .map(r => `<tr><td>${r.pageId}</td><td>${r.views.toLocaleString()}</td></tr>`)
          .join("");
      });
  </script>
</body>
</html>
